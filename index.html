<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockManager</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: #f0f2f8;
    --surface: #ffffff;
    --surface2: #f5f6fb;
    --border: #dde1ef;
    --text: #1a1c2e;
    --text-muted: #6b7099;
    --primary: #202063;
    --primary-hover: #191850;
    --success: #16a34a;
    --danger: #dc2626;
    --warning: #d97706;
    --info: #2563eb;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(32,32,99,.10);
}
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }
a { color: var(--primary); }

/* ── Layout ── */
.app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
}
.logo { font-size: 18px; font-weight: 700; color: var(--primary); letter-spacing: -.3px; }
.logo span { color: var(--text); }
.logo small { font-size: 11px; font-weight: 400; color: var(--text-muted); letter-spacing: .2px; vertical-align: middle; }
.header-actions { display: flex; gap: 10px; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

/* ── Stats Cards ── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color .2s;
}
.stat-card.alert { border-color: var(--warning); background: #fffbeb; }
.stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 700; line-height: 1; }
.stat-card.alert .stat-value { color: var(--warning); }

/* ── Toolbar ── */
.toolbar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 36px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--primary); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 15px; pointer-events: none; }
select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    cursor: pointer;
}
select:focus { border-color: var(--primary); }

/* ── Table ── */
.table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; }
thead { background: var(--surface2); }
th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--text-muted);
    white-space: nowrap;
}
td { padding: 13px 16px; border-top: 1px solid var(--border); vertical-align: middle; }
tr.row-low { background: #fffbeb; }
tr:hover td { background: rgba(32,32,99,.03); }
.empty { text-align: center; color: var(--text-muted); padding: 48px !important; }
.sku { font-family: monospace; font-size: 12px; color: var(--text-muted); }
.qty { font-weight: 600; font-size: 16px; }
.qty.zero { color: var(--danger); }
.min-qty { color: var(--text-muted); }

/* ── Badges ── */
.badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .3px;
}
.in-stock { background: #dcfce7; color: #15803d; }
.low-stock { background: #fef3c7; color: #b45309; }
.out-of-stock { background: #fee2e2; color: #b91c1c; }
.mv-badge { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; }
.mv-badge.in { background: #dcfce7; color: #15803d; }
.mv-badge.out { background: #fee2e2; color: #b91c1c; }

/* ── Sortable headers ── */
th.sortable {
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
}
th.sortable:hover { color: var(--text); background: rgba(255,255,255,.05); }
th.sortable .sort-icon { margin-left: 5px; opacity: .35; font-size: 11px; }
th.sortable.asc .sort-icon::after  { content: '▲'; opacity: 1; color: var(--primary); }
th.sortable.desc .sort-icon::after { content: '▼'; opacity: 1; color: var(--primary); }
th.sortable:not(.asc):not(.desc) .sort-icon::after { content: '⇅'; }

/* ── Buttons ── */
.btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #16a34a; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-sm {
    padding: 5px 10px;
    font-size: 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
    transition: all .15s;
}
.btn-in { background: #dcfce7; color: #15803d; }
.btn-in:hover { background: #bbf7d0; }
.btn-out { background: #fee2e2; color: #b91c1c; }
.btn-out:hover { background: #fecaca; }
.btn-del { background: #f1f2f7; color: var(--text-muted); }
.btn-del:hover { background: #fee2e2; color: #b91c1c; }
.actions { display: flex; gap: 6px; }

/* ── Modal ── */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
}
.modal.active { display: flex; }
.modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    box-shadow: var(--shadow);
    max-height: 90vh;
    overflow-y: auto;
}
.modal-box.wide { max-width: 700px; }
.modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
}
.modal-title { font-size: 17px; font-weight: 600; }
.close-btn {
    background: var(--surface2);
    border: none;
    color: var(--text-muted);
    width: 30px; height: 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
}
.close-btn:hover { background: var(--border); color: var(--text); }

/* ── Form ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; }
input[type=text], input[type=number] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
}
input:focus { border-color: var(--primary); }
textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    resize: vertical;
    min-height: 70px;
    width: 100%;
    transition: border-color .2s;
}
textarea:focus { border-color: var(--primary); }
.error-msg { color: var(--danger); font-size: 12px; margin-top: 4px; min-height: 16px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }

/* ── Movements ── */
.movements-list { display: flex; flex-direction: column; gap: 10px; max-height: 60vh; overflow-y: auto; }
.movement-row {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border-left: 3px solid transparent;
}
.movement-row.in { border-left-color: var(--success); background: #f0fdf4; }
.movement-row.out { border-left-color: var(--danger); background: #fff5f5; }
.mv-info { display: flex; align-items: center; gap: 10px; }
.mv-name { font-weight: 500; }
.mv-sku { color: var(--text-muted); font-family: monospace; font-size: 12px; }
.mv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; text-align: right; }
.mv-qty { font-weight: 600; }
.movement-row.in .mv-qty { color: #15803d; }
.movement-row.out .mv-qty { color: #b91c1c; }
.mv-notes { font-size: 12px; color: var(--text-muted); }
.mv-date { font-size: 11px; color: var(--text-muted); }

/* ── Toast ── */
#toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
.toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 14px;
    box-shadow: var(--shadow);
    opacity: 0;
    transform: translateX(20px);
    transition: all .25s;
    min-width: 220px;
}
.toast.show { opacity: 1; transform: translateX(0); }
.toast-success { border-left: 3px solid var(--success); }
.toast-error { border-left: 3px solid var(--danger); }
.toast-info { border-left: 3px solid var(--info); }

/* ── Responsive ── */
@media (max-width: 768px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    th:nth-child(6), td:nth-child(6) { display: none; }
}
@media (max-width: 500px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    th:nth-child(5), td:nth-child(5) { display: none; }
}
</style>
</head>
<body>

<header class="app-header">
    <div class="logo">Stock<span>Manager</span> <small>for fotomori</small></div>
    <div class="header-actions">
        <button class="btn btn-secondary" onclick="openMovementsModal()">📋 History</button>
        <button class="btn btn-primary" onclick="openAddModal()">+ Add Product</button>
    </div>
</header>

<div class="container">

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total Products</div>
            <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Units</div>
            <div class="stat-value" id="stat-units">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Stock Value</div>
            <div class="stat-value" id="stat-value">—</div>
        </div>
        <div class="stat-card" id="stat-low-card">
            <div class="stat-label">⚠ Low Stock Alerts</div>
            <div class="stat-value" id="stat-low">—</div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <select id="filter-category">
            <option value="">All Categories</option>
        </select>
    </div>

    <!-- Table -->
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th class="sortable" data-col="sku">SKU<span class="sort-icon"></span></th>
                    <th class="sortable" data-col="name">Name<span class="sort-icon"></span></th>
                    <th class="sortable" data-col="category">Category<span class="sort-icon"></span></th>
                    <th class="sortable" data-col="quantity">Qty<span class="sort-icon"></span></th>
                    <th class="sortable" data-col="min_stock">Min Stock<span class="sort-icon"></span></th>
                    <th class="sortable" data-col="unit_price">Unit Price (RM)<span class="sort-icon"></span></th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="product-tbody">
                <tr><td colspan="8" class="empty">Loading…</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal: Add Product -->
<div class="modal" id="modal-add">
    <div class="modal-box">
        <div class="modal-header">
            <div class="modal-title">Add New Product</div>
            <button class="close-btn" onclick="closeModal('modal-add')">✕</button>
        </div>
        <form id="add-form">
            <div class="form-grid">
                <div class="form-group full">
                    <label>Product Name *</label>
                    <input type="text" name="name" placeholder="e.g. Wireless Keyboard" required>
                </div>
                <div class="form-group">
                    <label>SKU *</label>
                    <input type="text" name="sku" placeholder="e.g. WK-001" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" name="category" placeholder="e.g. Electronics">
                </div>
                <div class="form-group">
                    <label>Initial Quantity</label>
                    <input type="number" name="quantity" placeholder="0" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Min Stock (Alert)</label>
                    <input type="number" name="min_stock" placeholder="10" min="1" value="10">
                </div>
                <div class="form-group full">
                    <label>Unit Price (RM)</label>
                    <input type="number" name="unit_price" placeholder="0.00" min="0" step="0.01" value="0">
                </div>
            </div>
            <div class="error-msg" id="add-error"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('modal-add')">Cancel</button>
                <button type="submit" class="btn btn-primary">Add Product</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal: Stock In/Out -->
<div class="modal" id="modal-stock">
    <div class="modal-box">
        <div class="modal-header">
            <div class="modal-title" id="stock-modal-title">Update Stock</div>
            <button class="close-btn" onclick="closeModal('modal-stock')">✕</button>
        </div>
        <form id="stock-form">
            <input type="hidden" id="stock-product-id">
            <input type="hidden" id="stock-type">
            <div class="form-grid">
                <div class="form-group full">
                    <label id="stock-type-label">Quantity</label>
                    <input type="number" id="stock-qty" name="quantity" placeholder="Enter quantity" min="1" required>
                </div>
                <div class="form-group full">
                    <label>Notes (optional)</label>
                    <textarea id="stock-notes" name="notes" placeholder="e.g. Supplier delivery, Order #1234…"></textarea>
                </div>
            </div>
            <div class="error-msg" id="stock-error"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('modal-stock')">Cancel</button>
                <button type="submit" class="btn btn-success" id="stock-btn">Update Stock</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal: Movements History -->
<div class="modal" id="modal-movements">
    <div class="modal-box wide">
        <div class="modal-header">
            <div class="modal-title">Stock Movement History</div>
            <button class="close-btn" onclick="closeModal('modal-movements')">✕</button>
        </div>
        <div class="movements-list" id="movements-list">
            <div class="empty">Loading…</div>
        </div>
    </div>
</div>

<div id="toast-container"></div>

<script src="js/app.js"></script>
</body>
</html>
